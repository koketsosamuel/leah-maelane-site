services:
  leah-maelane-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leah-maelane-site
    ports:
      - "80:3000"
    restart: unless-stopped
    networks:
      - leah-maelane-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  leah-maelane-network:
    driver: bridge
