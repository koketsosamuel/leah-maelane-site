server {
    listen 3000;
    listen [::]:3000;
    server_name _;
    root /usr/share/nginx/html;

    # Don't add port or absolute URLs to redirects
    port_in_redirect off;
    absolute_redirect off;

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }
}
